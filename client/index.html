<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>룬워드 크로니클 | RuneWord Chronicle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      color: #e0d8c8;
      font-family: 'Noto Sans KR', sans-serif;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }
    #login-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a0f 70%);
      z-index: 1000;
    }
    #login-screen h1 {
      font-size: 3rem; font-weight: 900;
      background: linear-gradient(135deg, #ffd700, #ff8c00, #ff4500);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
      animation: titleGlow 3s ease-in-out infinite;
    }
    @keyframes titleGlow {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.3); }
    }
    #login-screen h2 { font-size: 1rem; color: #888; margin-bottom: 2rem; }
    .login-box {
      background: rgba(20, 20, 40, 0.9);
      border: 1px solid #333; border-radius: 12px;
      padding: 2rem; width: 380px;
    }
    .login-box input, .login-box select {
      width: 100%; padding: 10px 14px; margin-bottom: 10px;
      background: #1a1a2e; border: 1px solid #444; border-radius: 6px;
      color: #e0d8c8; font-size: 14px; font-family: inherit;
    }
    .login-box input::placeholder { color: #666; }
    .login-box button {
      width: 100%; padding: 12px; margin-top: 6px;
      border: none; border-radius: 6px; font-size: 15px; font-weight: 700;
      cursor: pointer; font-family: inherit; transition: all 0.2s;
    }
    .btn-login { background: linear-gradient(135deg, #4a90d9, #357abd); color: white; }
    .btn-register { background: linear-gradient(135deg, #d4a030, #b8860b); color: white; }
    .btn-login:hover, .btn-register:hover { transform: translateY(-1px); filter: brightness(1.1); }
    .login-tabs { display: flex; gap: 0; margin-bottom: 1rem; }
    .login-tabs button {
      flex: 1; padding: 8px; background: #1a1a2e; border: 1px solid #333;
      color: #888; cursor: pointer; font-family: inherit;
    }
    .login-tabs button.active { background: #2a2a4e; color: #ffd700; border-bottom-color: #ffd700; }
    .login-tabs button:first-child { border-radius: 6px 0 0 6px; }
    .login-tabs button:last-child { border-radius: 0 6px 6px 0; }
    .register-fields { display: none; }
    .register-fields.show { display: block; }
    .login-error { color: #ff4444; font-size: 13px; margin-top: 8px; text-align: center; }
    .class-select-wrapper { margin-bottom: 10px; }
    .class-select-wrapper label { font-size: 13px; color: #aaa; display: block; margin-bottom: 4px; }

    #game-container { display: none; position: relative; width: 100vw; height: 100vh; }
    #game-canvas { display: block; image-rendering: pixelated; }

    #hud { position: fixed; top: 10px; left: 10px; z-index: 100; pointer-events: none; }
    .hud-bar { display: flex; align-items: center; margin-bottom: 4px; gap: 6px; }
    .hud-bar-label { font-size: 11px; font-weight: 700; width: 28px; text-align: right; }
    .hud-bar-track {
      width: 200px; height: 16px; background: #1a1a1a; border-radius: 3px;
      border: 1px solid #333; overflow: hidden; position: relative;
    }
    .hud-bar-fill { height: 100%; transition: width 0.3s; border-radius: 2px; }
    .hud-bar-fill.hp { background: linear-gradient(90deg, #cc2222, #ff4444); }
    .hud-bar-fill.mp { background: linear-gradient(90deg, #2244cc, #4488ff); }
    .hud-bar-fill.exp { background: linear-gradient(90deg, #ccaa00, #ffdd44); }
    .hud-bar-text {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700; color: white; text-shadow: 1px 1px 1px black;
    }
    #hud-info { font-size: 12px; margin-top: 6px; color: #ccc; }

    #quiz-panel {
      display: none; position: fixed;
      top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(10, 10, 20, 0.95);
      border: 2px solid #ffd700; border-radius: 16px;
      padding: 30px; z-index: 500; text-align: center;
      min-width: 400px;
      box-shadow: 0 0 40px rgba(255, 215, 0, 0.3);
      animation: quizAppear 0.3s ease-out;
    }
    @keyframes quizAppear {
      from { transform: translate(-50%, -50%) scale(0.8); opacity: 0; }
      to { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    }
    #quiz-monster-name { font-size: 14px; color: #ff8844; margin-bottom: 4px; }
    #quiz-timer {
      width: 100%; height: 6px; background: #333; border-radius: 3px;
      margin-bottom: 16px; overflow: hidden;
    }
    #quiz-timer-fill {
      height: 100%; background: linear-gradient(90deg, #ff4444, #ffaa00, #44ff44);
      transition: width 0.1s linear; border-radius: 3px;
    }
    #quiz-question { font-size: 2rem; font-weight: 900; color: #ffd700; margin-bottom: 20px; }
    #quiz-direction { font-size: 12px; color: #888; margin-bottom: 12px; }
    .quiz-choices { display: flex; gap: 16px; justify-content: center; }
    .quiz-choice {
      flex: 1; padding: 16px 24px; font-size: 1.2rem; font-weight: 700;
      background: #1a1a3a; border: 2px solid #444; border-radius: 10px;
      color: #e0d8c8; cursor: pointer; font-family: inherit; transition: all 0.15s;
    }
    .quiz-choice:hover { border-color: #ffd700; background: #2a2a4a; transform: translateY(-2px); }
    .quiz-choice.correct { border-color: #44ff44; background: #1a3a1a; color: #44ff44; }
    .quiz-choice.wrong { border-color: #ff4444; background: #3a1a1a; color: #ff4444; }

    #quiz-result {
      display: none; position: fixed;
      top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(10, 10, 20, 0.95);
      border: 2px solid #ffd700; border-radius: 16px;
      padding: 30px; z-index: 500; text-align: center;
      min-width: 350px;
      box-shadow: 0 0 40px rgba(255, 215, 0, 0.3);
    }

    #chat-box { position: fixed; bottom: 10px; left: 10px; width: 360px; z-index: 100; }
    #chat-messages {
      height: 150px; overflow-y: auto; padding: 8px;
      background: rgba(0,0,0,0.6); border-radius: 8px 8px 0 0;
      font-size: 12px; line-height: 1.6;
      scrollbar-width: thin; scrollbar-color: #444 transparent;
    }
    #chat-messages::-webkit-scrollbar { width: 4px; }
    #chat-messages::-webkit-scrollbar-thumb { background: #444; border-radius: 2px; }
    .chat-msg-name { color: #ffd700; font-weight: 700; }
    .chat-msg-system { color: #44ddff; font-style: italic; }
    #chat-input-wrapper { display: flex; }
    #chat-input {
      flex: 1; padding: 8px 12px; background: rgba(20,20,40,0.9);
      border: 1px solid #444; border-radius: 0 0 0 8px;
      color: #e0d8c8; font-size: 13px; font-family: inherit;
    }
    #chat-send {
      padding: 8px 16px; background: #4a90d9; border: none;
      border-radius: 0 0 8px 0; color: white; font-weight: 700;
      cursor: pointer; font-family: inherit;
    }

    #inventory-panel {
      display: none; position: fixed; top: 50%; right: 20px; transform: translateY(-50%);
      width: 320px; max-height: 80vh; overflow-y: auto;
      background: rgba(10, 10, 20, 0.95);
      border: 1px solid #555; border-radius: 12px;
      padding: 16px; z-index: 200;
    }
    #inventory-panel h3 { color: #ffd700; margin-bottom: 10px; font-size: 16px; }
    .inv-item {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 8px; margin-bottom: 4px;
      background: rgba(30, 30, 50, 0.8); border-radius: 6px;
      font-size: 12px; cursor: pointer;
      border: 1px solid transparent; transition: all 0.15s;
    }
    .inv-item:hover { border-color: #666; background: rgba(40, 40, 60, 0.9); }
    .inv-item.equipped { border-color: #ffd700; }
    .inv-item-icon {
      width: 28px; height: 28px; border-radius: 4px;
      display: flex; align-items: center; justify-content: center; font-size: 16px;
    }
    .inv-item-info { flex: 1; }
    .inv-item-name { font-weight: 700; }
    .inv-item-qty { color: #888; font-size: 11px; }
    .inv-item-actions { display: flex; gap: 4px; }
    .inv-item-actions button {
      padding: 2px 8px; font-size: 10px; border: 1px solid #444;
      background: #1a1a3a; color: #ccc; border-radius: 4px;
      cursor: pointer; font-family: inherit;
    }
    .inv-item-actions button:hover { border-color: #ffd700; color: #ffd700; }

    #npc-dialog {
      display: none; position: fixed;
      bottom: 180px; left: 50%; transform: translateX(-50%);
      width: 500px;
      background: rgba(10, 10, 20, 0.95);
      border: 2px solid #888; border-radius: 12px;
      padding: 20px; z-index: 300;
    }
    #npc-dialog h3 { color: #ffd700; margin-bottom: 8px; }
    #npc-dialog p { font-size: 14px; line-height: 1.8; margin-bottom: 10px; }
    #npc-dialog .close-btn {
      position: absolute; top: 8px; right: 12px;
      background: none; border: none; color: #888; font-size: 18px; cursor: pointer;
    }

    #shop-panel {
      display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 500px; max-height: 70vh; overflow-y: auto;
      background: rgba(10, 10, 20, 0.95);
      border: 2px solid #b8860b; border-radius: 12px;
      padding: 20px; z-index: 300;
    }
    #shop-panel h3 { color: #ffd700; margin-bottom: 12px; }
    .shop-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px; margin-bottom: 6px;
      background: rgba(30, 30, 50, 0.8); border-radius: 6px;
    }
    .shop-item-info { flex: 1; font-size: 13px; }
    .shop-item-name { font-weight: 700; }
    .shop-item-price { color: #ffd700; font-size: 12px; }
    .shop-item-desc { color: #888; font-size: 11px; }
    .shop-buy-btn {
      padding: 6px 14px; background: #b8860b; border: none;
      border-radius: 6px; color: white; font-weight: 700;
      cursor: pointer; font-family: inherit;
    }

    #minimap {
      position: fixed; top: 10px; right: 10px;
      width: 160px; height: 160px;
      background: rgba(0,0,0,0.7);
      border: 1px solid #444; border-radius: 8px;
      z-index: 100; overflow: hidden;
    }
    #minimap canvas { width: 100%; height: 100%; }

    #hotkeys {
      position: fixed; bottom: 10px; right: 10px;
      font-size: 11px; color: #666; z-index: 50;
      text-align: right; line-height: 1.8;
    }
  </style>
</head>
<body>

<div id="login-screen">
  <h1>룬워드 크로니클</h1>
  <h2>RuneWord Chronicle - 단어의 힘으로 싸우는 MMORPG</h2>
  <div class="login-box">
    <div class="login-tabs">
      <button class="active" onclick="showLoginTab('login')">로그인</button>
      <button onclick="showLoginTab('register')">회원가입</button>
    </div>
    <div id="login-fields">
      <input type="text" id="login-username" placeholder="아이디" autocomplete="off">
      <input type="password" id="login-password" placeholder="비밀번호">
      <button class="btn-login" onclick="doLogin()">입장하기</button>
    </div>
    <div id="register-fields" class="register-fields">
      <input type="text" id="reg-username" placeholder="아이디 (3자 이상)" autocomplete="off">
      <input type="password" id="reg-password" placeholder="비밀번호 (4자 이상)">
      <input type="text" id="reg-charname" placeholder="캐릭터 이름" autocomplete="off">
      <div class="class-select-wrapper">
        <label>직업 선택</label>
        <select id="reg-class">
          <option value="WARRIOR">워리어 - HP/DEF (근접 전사)</option>
          <option value="MAGE">메이지 - ATK/MP (마법사)</option>
          <option value="ROGUE">로그 - SPD/ATK (암살자)</option>
          <option value="HEALER">힐러 - MP/HP (치유사)</option>
        </select>
      </div>
      <button class="btn-register" onclick="doRegister()">캐릭터 생성</button>
    </div>
    <div id="login-error" class="login-error"></div>
  </div>
</div>

<div id="game-container">
  <canvas id="game-canvas"></canvas>

  <div id="hud">
    <div id="hud-name" style="font-weight:900; font-size:14px; margin-bottom:4px;"></div>
    <div class="hud-bar">
      <span class="hud-bar-label">HP</span>
      <div class="hud-bar-track">
        <div class="hud-bar-fill hp" id="hp-bar" style="width:100%"></div>
        <div class="hud-bar-text" id="hp-text">200/200</div>
      </div>
    </div>
    <div class="hud-bar">
      <span class="hud-bar-label">MP</span>
      <div class="hud-bar-track">
        <div class="hud-bar-fill mp" id="mp-bar" style="width:100%"></div>
        <div class="hud-bar-text" id="mp-text">50/50</div>
      </div>
    </div>
    <div class="hud-bar">
      <span class="hud-bar-label">EXP</span>
      <div class="hud-bar-track">
        <div class="hud-bar-fill exp" id="exp-bar" style="width:0%"></div>
        <div class="hud-bar-text" id="exp-text">0%</div>
      </div>
    </div>
    <div id="hud-info">
      <span id="hud-gold">G: 0</span> &nbsp;
      <span id="hud-atk">ATK: 0</span> &nbsp;
      <span id="hud-def">DEF: 0</span> &nbsp;
      <span id="hud-words">Words: 0/0</span>
    </div>
  </div>

  <div id="minimap"><canvas id="minimap-canvas" width="160" height="160"></canvas></div>

  <div id="chat-box">
    <div id="chat-messages"></div>
    <div id="chat-input-wrapper">
      <input type="text" id="chat-input" placeholder="채팅을 입력하세요... (Enter)" maxlength="200">
      <button id="chat-send" onclick="sendChat()">전송</button>
    </div>
  </div>

  <div id="hotkeys">
    [I] 인벤토리 | [1~5] 물약 | [Space/Click] 공격<br>
    [WASD/방향키] 이동 | [ESC] 닫기
  </div>

  <div id="quiz-panel">
    <div id="quiz-monster-name"></div>
    <div id="quiz-timer"><div id="quiz-timer-fill" style="width:100%"></div></div>
    <div id="quiz-direction"></div>
    <div id="quiz-question"></div>
    <div class="quiz-choices">
      <button class="quiz-choice" id="quiz-choice-0" onclick="answerQuiz(0)"></button>
      <button class="quiz-choice" id="quiz-choice-1" onclick="answerQuiz(1)"></button>
    </div>
  </div>

  <div id="quiz-result"></div>

  <div id="inventory-panel">
    <h3>인벤토리 <span id="inv-gold" style="color:#ffd700;float:right;font-size:13px;">G: 0</span></h3>
    <div id="inventory-list"></div>
  </div>

  <div id="npc-dialog">
    <button class="close-btn" onclick="closeNpcDialog()">X</button>
    <h3 id="npc-name"></h3>
    <div id="npc-text"></div>
    <div id="npc-actions"></div>
  </div>

  <div id="shop-panel">
    <button class="close-btn" onclick="closeShop()" style="position:absolute;top:8px;right:12px;background:none;border:none;color:#888;font-size:18px;cursor:pointer;">X</button>
    <h3 id="shop-title">상점</h3>
    <div id="shop-items"></div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/shared/constants.js"></script>
<script>
// === Global State ===
let socket = null;
let token = localStorage.getItem('rw_token') || null;
let player = null;
let worldState = { monsters: [], players: [], npcs: [] };
let inventory = [];
let keys = {};
let canvas, ctx;
let camera = { x: 0, y: 0 };
let selectedMonster = null;
let quizActive = false;
let quizTimerInterval = null;
let quizStartTime = 0;
let quizTimeLimit = 0;
let currentQuizMonsterInstanceId = null;
let inventoryOpen = false;
let animationFrame = null;

// === Audio System (Web Audio API) ===
let audioCtx = null;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function playSound(type) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  gain.gain.value = 0.15;
  const now = audioCtx.currentTime;
  if (type === 'correct') {
    osc.frequency.setValueAtTime(523, now);
    osc.frequency.setValueAtTime(659, now + 0.1);
    osc.frequency.setValueAtTime(784, now + 0.2);
    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
    osc.start(now); osc.stop(now + 0.4);
  } else if (type === 'wrong') {
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(200, now);
    osc.frequency.setValueAtTime(150, now + 0.15);
    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
    osc.start(now); osc.stop(now + 0.3);
  } else if (type === 'levelup') {
    osc.frequency.setValueAtTime(523, now);
    osc.frequency.setValueAtTime(659, now + 0.1);
    osc.frequency.setValueAtTime(784, now + 0.2);
    osc.frequency.setValueAtTime(1047, now + 0.3);
    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
    osc.start(now); osc.stop(now + 0.6);
  } else if (type === 'hit') {
    osc.type = 'square';
    osc.frequency.setValueAtTime(150, now);
    osc.frequency.exponentialRampToValueAtTime(50, now + 0.1);
    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
    osc.start(now); osc.stop(now + 0.15);
  } else if (type === 'buy') {
    osc.type = 'sine';
    osc.frequency.setValueAtTime(880, now);
    osc.frequency.setValueAtTime(1100, now + 0.05);
    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
    osc.start(now); osc.stop(now + 0.15);
  }
}

// === Login UI ===
function showLoginTab(tab) {
  document.querySelectorAll('.login-tabs button').forEach(b => b.classList.remove('active'));
  if (tab === 'login') {
    document.querySelector('.login-tabs button:first-child').classList.add('active');
    document.getElementById('login-fields').style.display = 'block';
    document.getElementById('register-fields').classList.remove('show');
  } else {
    document.querySelector('.login-tabs button:last-child').classList.add('active');
    document.getElementById('login-fields').style.display = 'none';
    document.getElementById('register-fields').classList.add('show');
  }
  document.getElementById('login-error').textContent = '';
}

async function doLogin() {
  const username = document.getElementById('login-username').value.trim();
  const password = document.getElementById('login-password').value;
  if (!username || !password) return showError('아이디와 비밀번호를 입력하세요.');
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (data.error) return showError(data.error);
    token = data.token;
    localStorage.setItem('rw_token', token);
    startGame();
  } catch (e) { showError('서버 연결 실패'); }
}

async function doRegister() {
  const username = document.getElementById('reg-username').value.trim();
  const password = document.getElementById('reg-password').value;
  const characterName = document.getElementById('reg-charname').value.trim();
  const characterClass = document.getElementById('reg-class').value;
  if (!username || !password || !characterName) return showError('모든 필드를 입력하세요.');
  try {
    const res = await fetch('/api/auth/register', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password, characterName, characterClass })
    });
    const data = await res.json();
    if (data.error) return showError(data.error);
    token = data.token;
    localStorage.setItem('rw_token', token);
    startGame();
  } catch (e) { showError('서버 연결 실패'); }
}

function showError(msg) { document.getElementById('login-error').textContent = msg; }

// === Game Start ===
function startGame() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('game-container').style.display = 'block';
  initAudio();

  canvas = document.getElementById('game-canvas');
  ctx = canvas.getContext('2d');
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  socket = io();
  socket.emit('authenticate', { token });

  setupSocketListeners();
  setupInputListeners();
  gameLoop();
}

function resizeCanvas() {
  if (!canvas) return;
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

// === Socket Events ===
function setupSocketListeners() {
  socket.on('auth_success', (data) => {
    player = data.player;
    updateHUD();
    addChatMessage(null, `${player.name}님, 룬워드 크로니클에 오신 것을 환영합니다!`, true);
  });

  socket.on('auth_error', (data) => {
    alert(data.error);
    localStorage.removeItem('rw_token');
    location.reload();
  });

  socket.on('world_state', (data) => { worldState = data; });

  socket.on('quiz_show', (data) => { showQuiz(data); });

  socket.on('quiz_result', (data) => { handleQuizResult(data); });

  socket.on('inventory_update', (data) => {
    inventory = data.items;
    if (inventoryOpen) renderInventory();
  });

  socket.on('item_used', (data) => {
    player.hp = data.hp; player.mp = data.mp;
    player.maxHp = data.maxHp; player.maxMp = data.maxMp;
    updateHUD();
  });

  socket.on('buy_success', (data) => {
    player.gold = data.gold;
    updateHUD();
    playSound('buy');
  });

  socket.on('sell_success', (data) => {
    player.gold = data.gold;
    updateHUD();
    playSound('buy');
    addChatMessage(null, `아이템을 ${data.earned}G에 판매했습니다.`, true);
  });

  socket.on('stats_update', (data) => { Object.assign(player, data); updateHUD(); });

  socket.on('healed', (data) => {
    player.hp = data.hp; player.mp = data.mp;
    player.maxHp = data.maxHp; player.maxMp = data.maxMp;
    updateHUD();
    addChatMessage(null, '완전히 회복되었습니다!', true);
  });

  socket.on('chat_message', (data) => { addChatMessage(data.name, data.message); });
  socket.on('system_message', (data) => { addChatMessage(null, data.message, true); });
  socket.on('npc_dialog', (data) => { showNpcDialog(data); });
  socket.on('shop_error', (data) => { addChatMessage(null, data.error, true); });
  socket.on('equip_error', (data) => { addChatMessage(null, data.error, true); });
}

// === Input ===
function setupInputListeners() {
  document.addEventListener('keydown', (e) => {
    if (document.activeElement === document.getElementById('chat-input')) {
      if (e.key === 'Enter') sendChat();
      if (e.key === 'Escape') document.getElementById('chat-input').blur();
      return;
    }
    keys[e.key.toLowerCase()] = true;
    if (e.key === 'i' || e.key === 'I') toggleInventory();
    if (e.key === 'Escape') closeAllPanels();
    if (e.key === 'Enter') document.getElementById('chat-input').focus();
    if (e.key === ' ') { e.preventDefault(); attackNearest(); }
    if (e.key === '1') useQuickItem('potion_hp_small');
    if (e.key === '2') useQuickItem('potion_hp_medium');
    if (e.key === '3') useQuickItem('potion_hp_large');
    if (e.key === '4') useQuickItem('potion_mp_small');
    if (e.key === '5') useQuickItem('potion_mp_medium');
  });
  document.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });
  document.addEventListener('click', (e) => {
    if (e.target.closest('#chat-box, #inventory-panel, #npc-dialog, #shop-panel, #quiz-panel, #quiz-result, #login-screen, #hud, #hotkeys, #minimap')) return;
    if (quizActive) return;
    handleCanvasClick(e);
  });
}

function handleCanvasClick(e) {
  if (!canvas || !player) return;
  const rect = canvas.getBoundingClientRect();
  const clickX = e.clientX - rect.left + camera.x;
  const clickY = e.clientY - rect.top + camera.y;

  for (const m of worldState.monsters) {
    const dx = m.x - clickX;
    const dy = m.y - clickY;
    if (Math.sqrt(dx * dx + dy * dy) < 24) {
      selectedMonster = m.instanceId;
      socket.emit('attack_monster', { monsterInstanceId: m.instanceId });
      return;
    }
  }

  for (const npc of worldState.npcs) {
    const dx = npc.x - clickX;
    const dy = npc.y - clickY;
    if (Math.sqrt(dx * dx + dy * dy) < 30) {
      socket.emit('interact_npc', { npcId: npc.id });
      return;
    }
  }
}

function attackNearest() {
  if (quizActive || !player) return;
  let nearest = null;
  let nearestDist = 100;
  for (const m of worldState.monsters) {
    const dx = m.x - player.x;
    const dy = m.y - player.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < nearestDist) { nearestDist = dist; nearest = m; }
  }
  if (nearest) {
    selectedMonster = nearest.instanceId;
    socket.emit('attack_monster', { monsterInstanceId: nearest.instanceId });
  }
}

function useQuickItem(itemId) { socket.emit('use_item', { itemId }); }

// === Quiz System ===
function showQuiz(data) {
  quizActive = true;
  currentQuizMonsterInstanceId = data.monsterInstanceId;
  document.getElementById('quiz-panel').style.display = 'block';
  document.getElementById('quiz-monster-name').textContent = `vs ${data.monsterName}`;
  document.getElementById('quiz-question').textContent = data.question;
  document.getElementById('quiz-direction').textContent = data.isKoreanToEnglish
    ? 'KR -> EN : 올바른 영어 뜻을 고르세요!'
    : 'EN -> KR : 올바른 한글 뜻을 고르세요!';
  document.getElementById('quiz-choice-0').textContent = data.choices[0];
  document.getElementById('quiz-choice-1').textContent = data.choices[1];
  document.getElementById('quiz-choice-0').className = 'quiz-choice';
  document.getElementById('quiz-choice-1').className = 'quiz-choice';
  document.getElementById('quiz-choice-0').style.pointerEvents = 'auto';
  document.getElementById('quiz-choice-1').style.pointerEvents = 'auto';
  quizStartTime = Date.now();
  quizTimeLimit = data.timeLimit;
  clearInterval(quizTimerInterval);
  quizTimerInterval = setInterval(() => {
    const elapsed = Date.now() - quizStartTime;
    const pct = Math.max(0, 100 - (elapsed / quizTimeLimit) * 100);
    document.getElementById('quiz-timer-fill').style.width = pct + '%';
    if (elapsed >= quizTimeLimit) { clearInterval(quizTimerInterval); answerQuiz(-1); }
  }, 50);
}

function answerQuiz(index) {
  if (!quizActive) return;
  clearInterval(quizTimerInterval);
  socket.emit('quiz_answer', { answerIndex: index, monsterInstanceId: currentQuizMonsterInstanceId });
  document.getElementById('quiz-choice-0').style.pointerEvents = 'none';
  document.getElementById('quiz-choice-1').style.pointerEvents = 'none';
}

function handleQuizResult(data) {
  document.getElementById('quiz-panel').style.display = 'none';
  const resultEl = document.getElementById('quiz-result');
  resultEl.style.display = 'block';

  if (data.correct) {
    playSound('hit');
    let html = `<div style="color:#44ff44;font-size:24px;font-weight:900;margin-bottom:8px;">CORRECT!</div>`;
    html += `<div style="font-size:14px;margin-bottom:8px;">"${data.question}" = ${data.correctAnswer}</div>`;
    html += `<div style="color:#ff4444;font-size:20px;font-weight:900;">${data.damage} DMG!</div>`;
    if (data.monsterDied) {
      html += `<div style="color:#ffd700;margin-top:8px;font-weight:700;">MONSTER DEFEATED!</div>`;
      if (data.rewards) {
        html += `<div style="font-size:13px;color:#aaa;margin-top:4px;">`;
        html += `+${data.rewards.exp} EXP | +${data.rewards.gold} Gold`;
        if (data.rewards.drops && data.rewards.drops.length > 0) html += ` | ${data.rewards.drops.length} Item(s)!`;
        html += `</div>`;
      }
      if (data.leveledUp) {
        playSound('levelup');
        html += `<div style="color:#ffd700;font-size:18px;margin-top:8px;">LEVEL UP! Lv.${data.playerState.level}</div>`;
      }
    } else {
      html += `<div style="font-size:12px;color:#888;margin-top:6px;">Monster HP: ${data.monsterHp}/${data.monsterMaxHp}</div>`;
    }
    if (data.playerState) Object.assign(player, data.playerState);
    resultEl.style.borderColor = '#44ff44';
    resultEl.innerHTML = html;
  } else {
    playSound('wrong');
    let html = `<div style="color:#ff4444;font-size:24px;font-weight:900;margin-bottom:8px;">${data.reason === 'timeout' ? 'TIME OUT!' : 'WRONG!'}</div>`;
    html += `<div style="font-size:14px;margin-bottom:6px;">"${data.question}" = ${data.correctAnswer}</div>`;
    html += `<div style="color:#888;font-size:13px;">MISS! 0 DMG</div>`;
    resultEl.style.borderColor = '#ff4444';
    resultEl.innerHTML = html;
  }

  updateHUD();
  setTimeout(() => {
    resultEl.style.display = 'none';
    quizActive = false;
    currentQuizMonsterInstanceId = null;
  }, 1500);
}

// === HUD ===
function updateHUD() {
  if (!player) return;
  document.getElementById('hud-name').textContent = `${player.name} Lv.${player.level} [${player.class}]`;
  const hpPct = Math.max(0, (player.hp / player.maxHp) * 100);
  document.getElementById('hp-bar').style.width = hpPct + '%';
  document.getElementById('hp-text').textContent = `${player.hp}/${player.maxHp}`;
  const mpPct = Math.max(0, (player.mp / player.maxMp) * 100);
  document.getElementById('mp-bar').style.width = mpPct + '%';
  document.getElementById('mp-text').textContent = `${player.mp}/${player.maxMp}`;
  const expTable = CONSTANTS.EXP_TABLE;
  const expNeeded = expTable[player.level - 1] || 99999;
  const expPct = Math.min(100, (player.exp / expNeeded) * 100);
  document.getElementById('exp-bar').style.width = expPct + '%';
  document.getElementById('exp-text').textContent = `${Math.floor(expPct)}%`;
  document.getElementById('hud-gold').textContent = `G: ${player.gold?.toLocaleString() || 0}`;
  document.getElementById('hud-atk').textContent = `ATK: ${player.atk}`;
  document.getElementById('hud-def').textContent = `DEF: ${player.def}`;
  document.getElementById('hud-words').textContent = `Words: ${player.wordsCorrect || 0}/${(player.wordsCorrect || 0) + (player.wordsWrong || 0)}`;
  document.getElementById('inv-gold').textContent = `G: ${player.gold?.toLocaleString() || 0}`;
}

// === Chat ===
function addChatMessage(name, message, isSystem = false) {
  const el = document.getElementById('chat-messages');
  const div = document.createElement('div');
  if (isSystem) div.innerHTML = `<span class="chat-msg-system">${message}</span>`;
  else div.innerHTML = `<span class="chat-msg-name">[${name}]</span> ${message}`;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
  while (el.children.length > 100) el.removeChild(el.firstChild);
}

function sendChat() {
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();
  if (!msg) return;
  socket.emit('chat_message', { message: msg });
  input.value = '';
  input.blur();
}

// === Inventory ===
function toggleInventory() {
  inventoryOpen = !inventoryOpen;
  document.getElementById('inventory-panel').style.display = inventoryOpen ? 'block' : 'none';
  if (inventoryOpen) { socket.emit('request_inventory'); renderInventory(); }
}

function renderInventory() {
  const list = document.getElementById('inventory-list');
  if (!inventory || inventory.length === 0) {
    list.innerHTML = '<div style="color:#666;font-size:13px;text-align:center;padding:20px;">인벤토리가 비어있습니다.</div>';
    return;
  }
  const gradeColors = { 0: '#CCCCCC', 1: '#00FF00', 2: '#0088FF', 3: '#AA00FF', 4: '#FF8800', 5: '#FF0044' };
  const typeIcons = { consumable: '[P]', equipment: '[E]', material: '[M]' };
  list.innerHTML = inventory.map(item => {
    if (!item.details) return '';
    const color = gradeColors[item.details.grade] || '#CCC';
    const icon = typeIcons[item.details.type] || '[?]';
    const eqBadge = item.equipped ? ' [장착]' : '';
    let actions = '';
    if (item.details.type === 'consumable') {
      actions = `<button onclick="socket.emit('use_item',{itemId:'${item.item_id}'})">사용</button>`;
    } else if (item.details.type === 'equipment') {
      actions = `<button onclick="socket.emit('equip_item',{inventoryId:${item.id}})">${item.equipped ? '해제' : '장착'}</button>`;
    }
    actions += `<button onclick="if(confirm('판매하시겠습니까?'))socket.emit('sell_item',{inventoryId:${item.id}})">판매</button>`;
    return `<div class="inv-item ${item.equipped ? 'equipped' : ''}">
      <div class="inv-item-icon">${icon}</div>
      <div class="inv-item-info">
        <div class="inv-item-name" style="color:${color}">${item.details.name}${eqBadge}</div>
        <div class="inv-item-qty">x${item.quantity} | ${item.details.description || ''}</div>
      </div>
      <div class="inv-item-actions">${actions}</div>
    </div>`;
  }).join('');
}

// === Game Loop ===
function gameLoop() {
  if (!player || !ctx) { animationFrame = requestAnimationFrame(gameLoop); return; }

  if (!quizActive) {
    let dx = 0, dy = 0;
    const speed = (player.speed || 3) * 2;
    if (keys['w'] || keys['arrowup']) dy -= speed;
    if (keys['s'] || keys['arrowdown']) dy += speed;
    if (keys['a'] || keys['arrowleft']) dx -= speed;
    if (keys['d'] || keys['arrowright']) dx += speed;
    if (dx !== 0 || dy !== 0) {
      if (dx !== 0 && dy !== 0) { dx *= 0.707; dy *= 0.707; }
      player.x += dx; player.y += dy;
      player.x = Math.max(16, Math.min(5000 - 16, player.x));
      player.y = Math.max(16, Math.min(4500 - 16, player.y));
      socket.emit('player_move', { x: player.x, y: player.y, direction: dx > 0 ? 'right' : dx < 0 ? 'left' : dy > 0 ? 'down' : 'up' });
    }
  }

  camera.x = player.x - canvas.width / 2;
  camera.y = player.y - canvas.height / 2;

  ctx.fillStyle = '#1a2a1a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  drawMap();
  for (const npc of worldState.npcs) drawNpc(npc);
  for (const m of worldState.monsters) drawMonster(m);
  for (const p of worldState.players) drawOtherPlayer(p);
  drawPlayer(player);
  drawMinimap();

  animationFrame = requestAnimationFrame(gameLoop);
}

// === Map Drawing ===
function drawMap() {
  const tileSize = 32;
  const startTileX = Math.floor(camera.x / tileSize);
  const startTileY = Math.floor(camera.y / tileSize);
  const endTileX = startTileX + Math.ceil(canvas.width / tileSize) + 1;
  const endTileY = startTileY + Math.ceil(canvas.height / tileSize) + 1;

  for (let ty = startTileY; ty <= endTileY; ty++) {
    for (let tx = startTileX; tx <= endTileX; tx++) {
      const screenX = tx * tileSize - camera.x;
      const screenY = ty * tileSize - camera.y;
      let color;
      if (tx >= 0 && tx < 50 && ty >= 0 && ty < 50) {
        if (tx >= 18 && tx <= 32 && ty >= 18 && ty <= 32) {
          color = '#3a3a2a';
        } else {
          const n = Math.sin(tx * 0.5) * Math.cos(ty * 0.3) * 0.15;
          const g = Math.floor(40 + n * 30);
          color = `rgb(${20 + (tx * 7 + ty * 3) % 10}, ${g + (tx * 3 + ty * 7) % 8}, ${15 + (tx + ty) % 5})`;
        }
      } else if (tx >= 50 && ty < 50) {
        const v = 25 + ((tx * 3 + ty * 7) % 10);
        color = `rgb(${v}, ${v - 5}, ${v + 5})`;
      } else if (tx < 50 && ty >= 50) {
        const v = 20 + ((tx * 5 + ty * 3) % 12);
        color = `rgb(${v}, ${v + 5}, ${v + 15})`;
      } else {
        const v = 30 + ((tx * 7 + ty * 11) % 10);
        color = `rgb(${v + 8}, ${v}, ${Math.max(0, v - 5)})`;
      }
      ctx.fillStyle = color;
      ctx.fillRect(screenX, screenY, tileSize, tileSize);
    }
  }

  // Zone labels
  ctx.fillStyle = 'rgba(255, 215, 0, 0.08)';
  ctx.fillRect(576 - camera.x, 576 - camera.y, 480, 480);

  ctx.fillStyle = '#ffd700';
  ctx.font = '14px "Noto Sans KR"';
  ctx.textAlign = 'center';
  ctx.fillText('여명의 마을', 816 - camera.x, 560 - camera.y);

  ctx.fillStyle = '#88cc88';
  ctx.fillText('단어의 숲', 1000 - camera.x, 180 - camera.y);

  ctx.fillStyle = '#888888';
  ctx.fillText('어둠의 평원', 2900 - camera.x, 180 - camera.y);

  ctx.fillStyle = '#88bbdd';
  ctx.fillText('수정 동굴', 1000 - camera.x, 1980 - camera.y);

  ctx.fillStyle = '#bbaa66';
  ctx.fillText('고대 유적', 2900 - camera.x, 1980 - camera.y);

  ctx.fillStyle = '#ff6644';
  ctx.fillText('용의 봉우리', 4500 - camera.x, 180 - camera.y);

  ctx.fillStyle = '#664488';
  ctx.fillText('그림자 영역', 4500 - camera.x, 1380 - camera.y);

  ctx.fillStyle = '#cc4444';
  ctx.fillText('심연의 문', 4500 - camera.x, 2980 - camera.y);

  ctx.textAlign = 'left';
}

// === Entity Drawing ===
function drawMonster(m) {
  const sx = m.x - camera.x;
  const sy = m.y - camera.y;
  if (sx < -50 || sx > canvas.width + 50 || sy < -50 || sy > canvas.height + 50) return;
  const size = m.isBoss ? 20 : 14;

  ctx.fillStyle = m.spriteColor || '#ff4444';
  if (m.spriteType === 'slime') {
    ctx.beginPath();
    ctx.arc(sx, sy, size, Math.PI, 0);
    ctx.lineTo(sx + size, sy + size * 0.3);
    ctx.quadraticCurveTo(sx, sy + size * 0.5, sx - size, sy + size * 0.3);
    ctx.fill();
  } else if (m.spriteType === 'dragon') {
    ctx.beginPath();
    ctx.moveTo(sx, sy - size);
    ctx.lineTo(sx - size * 1.5, sy + size);
    ctx.lineTo(sx + size * 1.5, sy + size);
    ctx.fill();
    ctx.fillStyle = m.spriteColor + '88';
    ctx.beginPath();
    ctx.moveTo(sx - size, sy);
    ctx.lineTo(sx - size * 2, sy - size * 0.5);
    ctx.lineTo(sx - size * 0.5, sy + size * 0.3);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(sx + size, sy);
    ctx.lineTo(sx + size * 2, sy - size * 0.5);
    ctx.lineTo(sx + size * 0.5, sy + size * 0.3);
    ctx.fill();
  } else if (m.spriteType === 'wolf') {
    ctx.beginPath();
    ctx.ellipse(sx, sy, size * 1.2, size * 0.7, 0, 0, Math.PI * 2);
    ctx.fill();
    // ears
    ctx.beginPath();
    ctx.moveTo(sx - size * 0.6, sy - size * 0.6);
    ctx.lineTo(sx - size * 0.3, sy - size * 1.1);
    ctx.lineTo(sx, sy - size * 0.5);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(sx + size * 0.6, sy - size * 0.6);
    ctx.lineTo(sx + size * 0.3, sy - size * 1.1);
    ctx.lineTo(sx, sy - size * 0.5);
    ctx.fill();
  } else if (m.spriteType === 'golem') {
    ctx.fillRect(sx - size, sy - size, size * 2, size * 2);
    ctx.fillStyle = m.spriteColor + 'AA';
    ctx.fillRect(sx - size * 0.6, sy - size * 1.3, size * 1.2, size * 0.5);
  } else if (m.spriteType === 'demon') {
    ctx.beginPath();
    ctx.arc(sx, sy, size, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ff0000';
    ctx.beginPath();
    ctx.moveTo(sx - size * 0.7, sy - size);
    ctx.lineTo(sx - size * 0.3, sy - size * 1.5);
    ctx.lineTo(sx + size * 0.1, sy - size * 0.8);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(sx + size * 0.7, sy - size);
    ctx.lineTo(sx + size * 0.3, sy - size * 1.5);
    ctx.lineTo(sx - size * 0.1, sy - size * 0.8);
    ctx.fill();
  } else {
    ctx.beginPath();
    ctx.arc(sx, sy, size, 0, Math.PI * 2);
    ctx.fill();
  }

  // Eyes
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(sx - 4, sy - 3, 3, 0, Math.PI * 2);
  ctx.arc(sx + 4, sy - 3, 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(sx - 3, sy - 3, 1.5, 0, Math.PI * 2);
  ctx.arc(sx + 5, sy - 3, 1.5, 0, Math.PI * 2);
  ctx.fill();

  // HP bar
  const hpPct = m.currentHp / m.hp;
  const barWidth = size * 2.5;
  ctx.fillStyle = '#333';
  ctx.fillRect(sx - barWidth / 2, sy - size - 12, barWidth, 4);
  ctx.fillStyle = hpPct > 0.5 ? '#44ff44' : hpPct > 0.2 ? '#ffaa00' : '#ff4444';
  ctx.fillRect(sx - barWidth / 2, sy - size - 12, barWidth * hpPct, 4);

  // Name
  ctx.fillStyle = m.isBoss ? '#ff8844' : '#ffcc88';
  ctx.font = `${m.isBoss ? '12px' : '10px'} "Noto Sans KR"`;
  ctx.textAlign = 'center';
  ctx.fillText(`${m.name} Lv.${m.level}`, sx, sy - size - 16);

  // Selection
  if (selectedMonster === m.instanceId) {
    ctx.strokeStyle = '#ffd700';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(sx, sy, size + 6, 0, Math.PI * 2);
    ctx.stroke();
    ctx.lineWidth = 1;
  }
  ctx.textAlign = 'left';
}

function drawPlayer(p) {
  const sx = p.x - camera.x;
  const sy = p.y - camera.y;
  const classColors = { WARRIOR: '#dd4444', MAGE: '#4488dd', ROGUE: '#44dd44', HEALER: '#dddd44' };
  const color = classColors[p.class] || '#dd4444';

  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(sx, sy + 14, 12, 5, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = color;
  ctx.fillRect(sx - 8, sy - 4, 16, 18);

  ctx.fillStyle = '#ffcc88';
  ctx.beginPath();
  ctx.arc(sx, sy - 10, 8, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#333';
  ctx.fillRect(sx - 4, sy - 12, 2, 2);
  ctx.fillRect(sx + 2, sy - 12, 2, 2);

  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 11px "Noto Sans KR"';
  ctx.textAlign = 'center';
  ctx.fillText(p.name, sx, sy - 22);
  ctx.textAlign = 'left';
}

function drawOtherPlayer(p) {
  const sx = p.x - camera.x;
  const sy = p.y - camera.y;
  if (sx < -50 || sx > canvas.width + 50 || sy < -50 || sy > canvas.height + 50) return;
  const classColors = { WARRIOR: '#dd6666', MAGE: '#6688dd', ROGUE: '#66dd66', HEALER: '#dddd66' };
  const color = classColors[p.class] || '#dd6666';

  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath();
  ctx.ellipse(sx, sy + 14, 10, 4, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = color;
  ctx.fillRect(sx - 7, sy - 3, 14, 16);
  ctx.fillStyle = '#ffcc88';
  ctx.beginPath();
  ctx.arc(sx, sy - 8, 7, 0, Math.PI * 2);
  ctx.fill();

  const hpPct = p.hp / p.maxHp;
  ctx.fillStyle = '#333';
  ctx.fillRect(sx - 16, sy - 20, 32, 3);
  ctx.fillStyle = '#44ff44';
  ctx.fillRect(sx - 16, sy - 20, 32 * hpPct, 3);

  ctx.fillStyle = '#aaddff';
  ctx.font = '10px "Noto Sans KR"';
  ctx.textAlign = 'center';
  ctx.fillText(`${p.name} Lv.${p.level}`, sx, sy - 24);
  ctx.textAlign = 'left';
}

function drawNpc(npc) {
  const sx = npc.x - camera.x;
  const sy = npc.y - camera.y;
  if (sx < -60 || sx > canvas.width + 60 || sy < -60 || sy > canvas.height + 60) return;

  ctx.fillStyle = npc.spriteColor || '#DDAA44';
  ctx.fillRect(sx - 10, sy - 5, 20, 22);
  ctx.fillStyle = '#ffddaa';
  ctx.beginPath();
  ctx.arc(sx, sy - 12, 9, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#ffff88';
  ctx.font = 'bold 11px "Noto Sans KR"';
  ctx.textAlign = 'center';
  ctx.fillText(npc.name, sx, sy - 26);

  const icons = { quest: '!', shop: '$', healer: '+' };
  ctx.fillStyle = '#ffd700';
  ctx.font = 'bold 16px sans-serif';
  ctx.fillText(icons[npc.type] || '?', sx, sy - 38);
  ctx.textAlign = 'left';
}

// === Minimap ===
function drawMinimap() {
  const mmCanvas = document.getElementById('minimap-canvas');
  const mmCtx = mmCanvas.getContext('2d');
  if (!mmCtx || !player) return;
  mmCtx.fillStyle = '#111';
  mmCtx.fillRect(0, 0, 160, 160);
  const scale = 160 / 5000;

  mmCtx.fillStyle = '#1a3a1a';
  mmCtx.fillRect(0, 0, 1600 * scale, 1600 * scale);
  mmCtx.fillStyle = '#2a2a2a';
  mmCtx.fillRect(2000 * scale, 0, 1800 * scale, 1600 * scale);
  mmCtx.fillStyle = '#1a2a3a';
  mmCtx.fillRect(0, 2000 * scale, 1800 * scale, 1800 * scale);
  mmCtx.fillStyle = '#2a2a1a';
  mmCtx.fillRect(2000 * scale, 2000 * scale, 1800 * scale, 1800 * scale);

  // Village marker
  mmCtx.fillStyle = 'rgba(255,215,0,0.3)';
  mmCtx.fillRect(576 * scale, 576 * scale, 480 * scale, 480 * scale);

  for (const m of worldState.monsters) {
    mmCtx.fillStyle = m.spriteColor || '#ff0000';
    mmCtx.fillRect(m.x * scale - 1, m.y * scale - 1, 2, 2);
  }
  for (const p of worldState.players) {
    mmCtx.fillStyle = '#44aaff';
    mmCtx.fillRect(p.x * scale - 1, p.y * scale - 1, 3, 3);
  }
  mmCtx.fillStyle = '#ffffff';
  mmCtx.fillRect(player.x * scale - 2, player.y * scale - 2, 4, 4);
  mmCtx.strokeStyle = '#ffd700';
  mmCtx.strokeRect(player.x * scale - 2, player.y * scale - 2, 4, 4);
}

// === Auto Login ===
if (token) startGame();
</script>
